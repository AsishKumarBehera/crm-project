<div class="wrapper">
  <div class="login-container">
    <h2 class="login-header">Signup</h2>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="login-form">

      <!-- Name -->
      <div class="input-group">
        <input type="text" formControlName="name" placeholder="Enter Name" />
      </div>

      <div 
        *ngIf="(submitted || signupForm.get('name')?.dirty) && signupForm.get('name')?.invalid"
        class="error"
      >
        <small>Name is required</small>
      </div>

      <!-- Email -->
      <div class="input-group">
        <input type="email" formControlName="email" placeholder="Enter Email" />
      </div>

      <div 
        *ngIf="(submitted || signupForm.get('email')?.dirty) && signupForm.get('email')?.invalid"
        class="error"
      >
        <small *ngIf="signupForm.get('email')?.errors?.['required']">
          Email is required
        </small>
        <small *ngIf="signupForm.get('email')?.errors?.['email']">
          Enter a valid email
        </small>
      </div>

      <!-- Password -->
      <div class="input-group">
        <input type="password" formControlName="password" placeholder="Enter Password" />
      </div>

      <div 
        *ngIf="(submitted || signupForm.get('password')?.dirty) && signupForm.get('password')?.invalid"
        class="error"
      >
        <small *ngIf="signupForm.get('password')?.errors?.['required']">
          Password is required
        </small>
        <small *ngIf="signupForm.get('password')?.errors?.['minlength']">
          Minimum 6 characters required
        </small>
      </div>

      <!-- Button -->
      <button class="login-btn" type="submit">
        Signup
      </button>

    </form>

    <p class="text-login">
      Already have an account?
      <a routerLink="/">Login</a>
    </p>
  </div>
</div>
