<div class="lead-card">

  <h2 class="lead-card__title">{{ lead?.name }}</h2>

  <div class="lead-card__grid">
    <div class="lead-card__item">
      <span class="label">Email</span>
      <span class="value">{{ lead?.email }}</span>
    </div>

    <div class="lead-card__item">
      <span class="label">Phone</span>
      <span class="value">{{ lead?.phone }}</span>
    </div>

    <div class="lead-card__item">
      <span class="label">Stage</span>
      <span class="badge stage">{{ lead?.stage }}</span>
    </div>

    <div class="lead-card__item">
      <span class="label">Status</span>
      <span class="badge status">{{ lead?.status }}</span>
    </div>
  </div>

</div>
