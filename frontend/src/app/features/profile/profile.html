<div class="profile">
  
  <div class="profile__container">
    
    <h2 class="profile__title">Edit Profile 👤</h2>

    <div class="profile__form">
      
      <input 
        class="profile__input"
        type="text" 
        [(ngModel)]="user.name" 
        placeholder="Enter Name" 
      />

      <input 
        class="profile__input"
        type="email" 
        [(ngModel)]="user.email" 
        placeholder="Enter Email" 
      />

    </div>

    <div class="profile__actions">
      <button class="profile__btn profile__btn--primary" (click)="updateProfile()">
        Update
      </button>

      <button class="profile__btn profile__btn--secondary" (click)="goBack()">
        Back
      </button>
    </div>

  </div>

</div>
